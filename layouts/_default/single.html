{{ define "main" }}
<!-- 搜索栏 -->
<div class="search-bar">
    <input type="text" id="searchInput" placeholder="🔍 搜索所有新闻...">
    <button id="searchBtn">搜索</button>
</div>
<div id="searchResults" class="search-results" style="display: none;"></div>

<!-- 当日新闻内容 -->
<article class="daily-news">
    <h2 class="daily-date">
        {{ .Date.Format "2006年1月2日" }} · 周{{ index (split "日一二三四五六" "") (int .Date.Weekday) }}
    </h2>
    {{ .Content }}
</article>

<!-- 前后日导航 -->
<nav class="day-nav">
    {{ with .PrevInSection }}
    <a href="{{ .RelPermalink }}" class="nav-prev">← {{ .Date.Format "1月2日" }}</a>
    {{ end }}
    {{ with .NextInSection }}
    <a href="{{ .RelPermalink }}" class="nav-next">{{ .Date.Format "1月2日" }} →</a>
    {{ end }}
</nav>
{{ end }}

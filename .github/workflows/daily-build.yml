name: 每日早报 - 自动构建部署

on:
  schedule:
    # 每天早上 9:00 (UTC+8) = 1:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      # 3. 安装 Python 依赖
      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      # 4. 抓取新闻（需要 DEEPSEEK_API_KEY）
      - name: Fetch daily news
        if: ${{ env.DEEPSEEK_API_KEY != '' }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/fetch_news.py

      # 5. 抓取市场行情
      - name: Fetch market data
        run: python scripts/fetch_market.py
        continue-on-error: true

      # 6. 构建搜索索引
      - name: Build search index
        run: python scripts/build_index.py

      # 7. 提交新内容到仓库
      - name: Commit new content
        run: |
          git config user.name "Daily News Bot"
          git config user.email "bot@users.noreply.github.com"
          git add content/ static/
          git diff --cached --quiet || git commit -m "📰 Daily news: $(date +%Y-%m-%d)"
          git push

      # 8. 安装 Hugo
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      # 9. Hugo 构建
      - name: Build with Hugo
        run: hugo --minify

      # 10. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
